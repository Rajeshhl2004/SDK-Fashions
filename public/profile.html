<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SDK Fashions - My Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .navbar { background: #2874f0; padding: 1rem 2rem; }
    .navbar a { color: white; text-decoration: none; font-weight: bold; }
    .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 1rem; color: #333; }
    h3 { margin-bottom: 1rem; color: #555; font-size: 15px; }
    input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .btn { width: 100%; padding: 12px; background: #fb641b; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
    .success { color: green; font-size: 13px; margin-top: 8px; display: none; }
    .error { color: red; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
<nav class="navbar"><a href="/">← SDK Fashions</a></nav>

<div class="container">
  <div class="card">
    <h2>My Profile</h2>
    <p id="userName" style="font-size:16px;margin-bottom:4px;"></p>
    <p id="userEmail" style="font-size:14px;color:#666;"></p>
    <a href="/orders.html" style="display:inline-block;margin-top:1rem;color:#2874f0;font-size:14px;">View My Orders →</a>
  </div>

  <div class="card">
    <h3>Delivery Address</h3>
    <input type="text" id="addrName" placeholder="Full Name" />
    <input type="text" id="addrPhone" placeholder="Phone Number" />
    <input type="text" id="addrStreet" placeholder="Street Address" />
    <input type="text" id="addrCity" placeholder="City" />
    <input type="text" id="addrState" placeholder="State" />
    <input type="text" id="addrPincode" placeholder="Pincode" />
    <button class="btn" onclick="saveAddress()">Save Address</button>
    <p class="success" id="successMsg">Address saved!</p>
    <p class="error" id="errorMsg"></p>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!token || !user) window.location.href = '/login.html';

  document.getElementById('userName').textContent = user.name;
  document.getElementById('userEmail').textContent = user.email;

  // Load saved address
  const saved = JSON.parse(localStorage.getItem('savedAddress') || '{}');
  if (saved.name) {
    document.getElementById('addrName').value = saved.name || '';
    document.getElementById('addrPhone').value = saved.phone || '';
    document.getElementById('addrStreet').value = saved.street || '';
    document.getElementById('addrCity').value = saved.city || '';
    document.getElementById('addrState').value = saved.state || '';
    document.getElementById('addrPincode').value = saved.pincode || '';
  }

  function saveAddress() {
    const address = {
      name: document.getElementById('addrName').value,
      phone: document.getElementById('addrPhone').value,
      street: document.getElementById('addrStreet').value,
      city: document.getElementById('addrCity').value,
      state: document.getElementById('addrState').value,
      pincode: document.getElementById('addrPincode').value
    };

    if (!address.name || !address.phone || !address.street) {
      document.getElementById('errorMsg').textContent = 'Please fill required fields!';
      document.getElementById('errorMsg').style.display = 'block';
      return;
    }

    localStorage.setItem('savedAddress', JSON.stringify(address));
    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    setTimeout(() => document.getElementById('successMsg').style.display = 'none', 2000);
  }
</script>
</body>
</html>
