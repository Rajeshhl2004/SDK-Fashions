<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDK Fashions - Product</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .navbar { background: #2874f0; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    .navbar a { color: white; text-decoration: none; font-weight: bold; }
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    .product-detail { background: white; border-radius: 8px; padding: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
    .product-detail img { width: 100%; border-radius: 8px; object-fit: cover; max-height: 400px; }
    .product-info h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .price { font-size: 2rem; font-weight: bold; color: #333; margin: 1rem 0; }
    .category-tag { background: #f0f5ff; color: #2874f0; padding: 4px 12px; border-radius: 10px; font-size: 13px; display: inline-block; margin-bottom: 1rem; }
    .rating-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; font-size: 14px; color: #666; }
    .sizes-section { margin: 1rem 0; }
    .sizes-section h3 { font-size: 14px; margin-bottom: 8px; color: #666; }
    .size-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .size-btn { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 14px; background: white; }
    .size-btn.selected { border-color: #2874f0; background: #2874f0; color: white; }
    .size-btn:hover { border-color: #2874f0; }
    .btn-cart { width: 100%; padding: 14px; background: #ff9f00; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 1rem; font-weight: bold; }
    .btn-buy { width: 100%; padding: 14px; background: #fb641b; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 8px; font-weight: bold; }
    .description { margin-top: 1rem; font-size: 14px; color: #666; line-height: 1.6; }
    .similar-section { margin-top: 2rem; }
    .similar-section h2 { font-size: 1.2rem; margin-bottom: 1rem; }
    .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .similar-card { background: white; border-radius: 8px; overflow: hidden; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .similar-card img { width: 100%; height: 160px; object-fit: cover; }
    .similar-card .info { padding: 0.5rem; }
    .similar-card .name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .similar-card .price { font-size: 14px; font-weight: bold; color: #333; }
    .reviews-section { background: white; border-radius: 8px; padding: 1.5rem; margin-top: 2rem; }
    .reviews-section h2 { font-size: 1.2rem; margin-bottom: 1rem; }
    .review-form { background: #f9f9f9; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; }
    .review-form h3 { font-size: 15px; margin-bottom: 1rem; }
    .stars { display: flex; gap: 4px; margin-bottom: 1rem; }
    .star { font-size: 24px; cursor: pointer; color: #ddd; }
    .star.active { color: #ff9f00; }
    textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; height: 80px; resize: vertical; }
    .btn-review { padding: 10px 24px; background: #2874f0; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 8px; }
    .review-card { padding: 1rem 0; border-bottom: 1px solid #f0f0f0; }
    .review-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .reviewer-name { font-weight: bold; font-size: 14px; }
    .review-stars { color: #ff9f00; font-size: 14px; }
    .review-comment { font-size: 14px; color: #666; margin-top: 4px; }
    .review-date { font-size: 12px; color: #999; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 4px; font-size: 14px; display: none; z-index: 999; }
    @media (max-width: 768px) {
      .product-detail { grid-template-columns: 1fr; }
      .similar-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/">← Home</a>
  <span style="color:white;font-weight:bold;margin-left:auto;">SDK Fashions</span>
  <a href="/cart.html" style="margin-left:1rem;">🛒 Cart</a>
</nav>

<div class="container">
  <div id="productDetail">Loading...</div>
  <div class="similar-section">
    <h2>Similar Products</h2>
    <div class="similar-grid" id="similarGrid">Loading...</div>
  </div>
  <div class="reviews-section">
    <h2>Ratings & Reviews</h2>
    <div class="review-form" id="reviewForm">
      <h3>Write a Review</h3>
      <div class="stars" id="stars">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
      </div>
      <textarea id="reviewComment" placeholder="Share your experience..."></textarea>
      <br/>
      <button class="btn-review" onclick="submitReview()">Submit Review</button>
    </div>
    <div id="reviewsList">Loading reviews...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  let selectedRating = 0;
  let selectedSize = '';
  let currentProduct = null;

  if (!productId) window.location.href = '/';

  loadProduct();
  loadReviews();

  async function loadProduct() {
    try {
      const res = await fetch('/products/' + productId);
      const product = await res.json();
      currentProduct = product;
      document.title = product.name + ' - SDK Fashions';

      const sizes = product.sizes && product.sizes.length > 0 ? `
        <div class="sizes-section">
          <h3>Select Size:</h3>
          <div class="size-buttons">
            ${product.sizes.map(s => `<button class="size-btn" onclick="selectSize('${s}', this)">${s}</button>`).join('')}
          </div>
        </div>
      ` : '';

      document.getElementById('productDetail').innerHTML = `
        <div class="product-detail">
          <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400'" />
          <div class="product-info">
            <span class="category-tag">${product.category}</span>
            <h1>${product.name}</h1>
            <div class="rating-row">
              <span style="background:#388e3c;color:white;padding:2px 8px;border-radius:4px;font-size:13px;">
                ⭐ ${product.ratings ? product.ratings.toFixed(1) : '0'}
              </span>
              <span>${product.numReviews || 0} reviews</span>
            </div>
            <p class="price">₹${product.price}</p>
            ${sizes}
            <p style="font-size:13px;color:${product.stock > 0 ? 'green' : 'red'};">
              ${product.stock > 0 ? '✅ In Stock (' + product.stock + ' left)' : '❌ Out of Stock'}
            </p>
            ${product.description ? `<p class="description">${product.description}</p>` : ''}
            <button class="btn-cart" onclick="addToCart()">🛒 Add to Cart</button>
            <button class="btn-buy" onclick="buyNow()">⚡ Buy Now</button>
          </div>
        </div>
      `;

      loadSimilar(product.category, product._id);
    } catch (err) {
      document.getElementById('productDetail').innerHTML = '<p>Product not found!</p>';
    }
  }

  function selectSize(size, btn) {
    selectedSize = size;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function addToCart() {
    if (currentProduct.sizes && currentProduct.sizes.length > 0 && !selectedSize) {
      showToast('Please select a size!'); return;
    }
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const existing = cart.find(i => i.id === currentProduct._id && i.size === selectedSize);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({
        id: currentProduct._id,
        name: currentProduct.name,
        price: currentProduct.price,
        image: currentProduct.image,
        size: selectedSize,
        quantity: 1
      });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    showToast('Added to cart! 🛒');
  }

  function buyNow() {
    addToCart();
    setTimeout(() => window.location.href = '/cart.html', 500);
  }

  async function loadSimilar(category, currentId) {
    try {
      const res = await fetch('/products');
      const all = await res.json();
      const similar = all.filter(p => p.category === category && p._id !== currentId).slice(0, 6);
      const grid = document.getElementById('similarGrid');
      if (!similar.length) { grid.innerHTML = '<p>No similar products!</p>'; return; }
      grid.innerHTML = similar.map(p => `
        <div class="similar-card" onclick="window.location.href='/product.html?id=${p._id}'">
          <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/180x160'" />
          <div class="info">
            <p class="name">${p.name}</p>
            <p class="price">₹${p.price}</p>
          </div>
        </div>
      `).join('');
    } catch {}
  }

  function setRating(rating) {
    selectedRating = rating;
    document.querySelectorAll('.star').forEach((s, i) => {
      s.classList.toggle('active', i < rating);
    });
  }

  async function submitReview() {
    const token = localStorage.getItem('token');
    if (!token) { showToast('Please login to review!'); return; }
    if (!selectedRating) { showToast('Please select rating!'); return; }
    const comment = document.getElementById('reviewComment').value;
    if (!comment) { showToast('Please write a comment!'); return; }

    try {
      const res = await fetch('/products/' + productId + '/review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ rating: selectedRating, comment })
      });
      const data = await res.json();
      if (res.ok) {
        showToast('Review submitted! ⭐');
        document.getElementById('reviewComment').value = '';
        setRating(0);
        loadReviews();
      } else {
        showToast(data.message);
      }
    } catch { showToast('Something went wrong!'); }
  }

  async function loadReviews() {
    try {
      const res = await fetch('/products/' + productId + '/reviews');
      const reviews = await res.json();
      const container = document.getElementById('reviewsList');
      if (!reviews.length) { container.innerHTML = '<p style="color:#666;">No reviews yet — be the first!</p>'; return; }
      container.innerHTML = reviews.map(r => `
        <div class="review-card">
          <div class="review-header">
            <span class="reviewer-name">${r.userName}</span>
            <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
          </div>
          <p class="review-comment">${r.comment}</p>
          <p class="review-date">${new Date(r.createdAt).toLocaleDateString('en-IN')}</p>
        </div>
      `).join('');
    } catch {}
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2500);
  }
</script>
</body>
</html>
